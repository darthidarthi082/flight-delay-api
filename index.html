<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlightSense — Delay Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #05080f;
    --surface: rgba(10,15,28,0.85);
    --surface2: rgba(15,22,40,0.9);
    --border: rgba(100,160,255,0.12);
    --accent: #4fc3f7;
    --accent2: #f06292;
    --success: #81c784;
    --text: #e8eaf6;
    --muted: #5c6880;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Sky background ── */
  #sky-canvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Airport runway SVG at the bottom ── */
  #runway-wrap {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.55;
  }

  /* Grid overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,195,247,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,195,247,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 120px;
    position: relative;
    z-index: 2;
  }

  header { margin-bottom: 44px; animation: fadeUp 0.7s ease both; }

  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(79,195,247,0.08);
    border: 1px solid rgba(79,195,247,0.18);
    color: var(--accent);
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 4px 10px; border-radius: 2px; margin-bottom: 14px;
  }
  .badge::before {
    content: ''; width: 6px; height: 6px;
    background: var(--accent); border-radius: 50%;
    animation: blink 2s ease infinite;
  }

  h1 {
    font-family: var(--font-head);
    font-size: clamp(38px, 7vw, 68px);
    font-weight: 800; line-height: 1; letter-spacing: -0.03em; color: #fff;
  }
  h1 span { color: var(--accent); }
  .subtitle { margin-top: 10px; color: var(--muted); font-size: 12px; letter-spacing: 0.06em; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 28px 28px;
    margin-bottom: 16px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    animation: fadeUp 0.6s ease 0.1s both;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .card-title {
    font-family: var(--font-head);
    font-size: 10px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  @media(max-width:600px){ .grid-2,.grid-3{ grid-template-columns:1fr; } }

  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-size: 9px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted); }

  select, input[type="number"] {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono); font-size: 13px;
    padding: 9px 12px; border-radius: 3px; outline: none;
    transition: border-color 0.2s; width: 100%; appearance: none;
  }
  select:focus, input[type="number"]:focus { border-color: rgba(79,195,247,0.35); }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾'; position: absolute; right: 11px; top: 50%;
    transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 10px;
  }

  .route-row { display: grid; grid-template-columns: 1fr 36px 1fr; gap: 10px; align-items: end; }
  .arrow-mid { padding-bottom: 9px; color: var(--accent); font-size: 20px; text-align: center; }

  /* Sliders */
  .slider-wrap { display: flex; flex-direction: column; gap: 6px; }
  .slider-row { display: flex; align-items: center; gap: 10px; }
  input[type="range"] {
    flex: 1; -webkit-appearance: none;
    height: 2px; background: rgba(79,195,247,0.15); border-radius: 1px; outline: none; cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px;
    background: var(--accent); border-radius: 50%; transition: transform 0.15s;
    box-shadow: 0 0 8px rgba(79,195,247,0.5);
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.4); }
  .slider-val { font-size: 12px; color: var(--accent); min-width: 40px; text-align: right; }

  /* Button */
  .btn {
    width: 100%; padding: 15px;
    background: var(--accent); color: #000;
    font-family: var(--font-head); font-size: 13px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    border: none; border-radius: 3px; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(79,195,247,0.25);
    margin-top: 4px;
  }
  .btn:hover { opacity: 0.92; transform: translateY(-2px); box-shadow: 0 4px 32px rgba(79,195,247,0.4); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn .spinner {
    display: none; width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.2); border-top-color: #000;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto;
  }
  .btn.loading .btn-text { display: none; }
  .btn.loading .spinner { display: block; }

  /* Result */
  #result { display: none; margin-top: 20px; animation: fadeUp 0.4s ease both; }

  .result-card {
    border-radius: 6px; padding: 26px 28px; border: 1px solid;
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .result-card.on-time { background: rgba(129,199,132,0.05); border-color: rgba(129,199,132,0.22); }
  .result-card.delayed { background: rgba(240,98,146,0.05); border-color: rgba(240,98,146,0.22); }

  .result-label {
    font-family: var(--font-head); font-size: 30px; font-weight: 800;
    letter-spacing: -0.02em; margin-bottom: 4px;
  }
  .on-time .result-label { color: var(--success); }
  .delayed .result-label { color: var(--accent2); }

  .result-route { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 18px; }

  .prob-label {
    display: flex; justify-content: space-between;
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .prob-val { color: var(--text); }
  .prob-bar-bg { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-bottom: 18px; }
  .prob-bar-fill { height: 100%; border-radius: 2px; transition: width 0.9s cubic-bezier(0.16,1,0.3,1); width: 0%; }
  .on-time .prob-bar-fill { background: var(--success); }
  .delayed .prob-bar-fill { background: var(--accent2); }

  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .stat { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 3px; padding: 10px 12px; }
  .stat-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .stat-val { font-size: 14px; font-weight: 500; color: var(--text); }

  .error-msg {
    display: none;
    background: rgba(229,115,115,0.07); border: 1px solid rgba(229,115,115,0.18);
    color: #ef9a9a; padding: 12px 16px; border-radius: 3px; font-size: 11px; margin-top: 10px;
  }

  footer {
    margin-top: 48px; text-align: center;
    font-size: 11px; color: var(--muted); letter-spacing: 0.07em;
  }
  footer a { color: var(--accent); text-decoration: none; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>

<div class="container">
  <header>

    <h1>Flight<span>Sense</span></h1>
    <p class="subtitle">// predict departure delays before they happen</p>
  </header>

  <div class="card">
    <div class="card-title">Route</div>
    <div class="route-row">
      <div class="field">

        <div class="select-wrap"><select id="origin"></select></div>
      </div>
      <div class="arrow-mid">✈</div>
      <div class="field">
        <label>Destination Airport</label>
        <div class="select-wrap"><select id="dest"></select></div>
      </div>

  </div>

  <div class="card">
    <div class="card-title">Flight details</div>
    <div class="grid-3" style="margin-bottom:14px">
      <div class="field">
        <label>Airline</label>
        <div class="select-wrap"><select id="airline"></select></div>
      </div>
      <div class="field">
        <label>Day of Week</label>

          <select id="dow">
            <option value="1">Monday</option><option value="2">Tuesday</option>
            <option value="3">Wednesday</option><option value="4">Thursday</option>
            <option value="5">Friday</option><option value="6">Saturday</option>
            <option value="7" selected>Sunday</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Month</label>
        <div class="select-wrap">
          <select id="month">
            <option value="1">January</option><option value="2">February</option>
            <option value="3">March</option><option value="4">April</option>
            <option value="5">May</option><option value="6" selected>June</option>
            <option value="7">July</option><option value="8">August</option>
            <option value="9">September</option><option value="10">October</option>
            <option value="11">November</option><option value="12">December</option>
          </select>
        </div>
      </div>
    </div>

    <div class="grid-2" style="margin-bottom:14px">
      <div class="slider-wrap">
        <label>Departure Time</label>
        <div class="slider-row">
          <input type="range" id="deptime" min="0" max="23" value="18"
            oninput="document.getElementById('deptime-val').textContent=String(this.value).padStart(2,'0')+':00'">
          <span class="slider-val" id="deptime-val">18:00</span>
        </div>
      </div>
      <div class="slider-wrap">
        <label>Distance (miles)</label>
        <div class="slider-row">
          <input type="range" id="distance" min="50" max="5000" step="50" value="500"
            oninput="document.getElementById('dist-val').textContent=this.value">
          <span class="slider-val" id="dist-val">500</span>
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="slider-wrap">
        <label>Taxi Out (minutes)</label>
        <div class="slider-row">
          <input type="range" id="taxiout" min="1" max="90" value="30"
            oninput="document.getElementById('taxi-val').textContent=this.value">
          <span class="slider-val" id="taxi-val">30</span>
        </div>
      </div>
      <div class="slider-wrap">
        <label>Prior Leg Delay (minutes)</label>
        <div class="slider-row">
          <input type="range" id="prior" min="0" max="180" step="5" value="45"
            oninput="document.getElementById('prior-val').textContent=this.value">
          <span class="slider-val" id="prior-val">45</span>
        </div>
      </div>
    </div>
  </div>

  <button class="btn" id="predict-btn" onclick="predict()">
    <span class="btn-text">✈ &nbsp;Predict Delay</span>
    <div class="spinner"></div>
  </button>

  <div class="error-msg" id="error-msg"></div>

  <div id="result">
    <div class="result-card" id="result-card">
      <div class="result-label" id="result-label"></div>
      <div class="result-route" id="result-route"></div>
      <div class="prob-label">
        <span>Delay Probability</span>
        <span class="prob-val" id="prob-pct"></span>
      </div>
      <div class="prob-bar-bg">
        <div class="prob-bar-fill" id="prob-bar"></div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-label">Confidence</div>
          <div class="stat-val" id="stat-conf"></div>
        </div>
        <div class="stat">
          <div class="stat-label">Probability</div>
          <div class="stat-val" id="stat-prob"></div>
        </div>
        <div class="stat">
          <div class="stat-label">Verdict</div>
          <div class="stat-val" id="stat-verdict"></div>
        </div>
      </div>
    </div>
  </div>

  <footer style="margin-top:48px">
    Powered by XGBoost · 565k flights trained ·
    <a href="https://github.com/darthidarthi082/flight-delay-api" target="_blank">GitHub ↗</a>
  </footer>
</div>

<script>
  // ── CHANGE THIS TO YOUR RENDER URL ──
  const API_URL = "https://flight-delay-api-1.onrender.com";

  const AIRLINES = ["AA","AS","B6","DL","F9","G4","HA","NK","OH","OO","QX","UA","WN","YV","YX","MQ","9E","EV"];
  const AIRPORTS = [
    "ATL","LAX","ORD","DFW","DEN","JFK","SFO","SEA","LAS","MCO",
    "EWR","CLT","PHX","MIA","IAH","BOS","MSP","DTW","FLL","LGA",
    "BWI","MDW","SLC","DCA","SAN","HNL","PDX","STL","TPA","OAK",
    "MCI","RDU","DAL","BNA","AUS","SMF","MSY","SJC","CLE","PIT"
  ];

  function populate(id, items, sel) {
    const el = document.getElementById(id);
    items.forEach(v => {
      const o = document.createElement('option');
      o.value = o.textContent = v;
      if (v === sel) o.selected = true;
      el.appendChild(o);
    });
  }
  populate('airline', AIRLINES, 'UA');
  populate('origin',  AIRPORTS, 'EWR');
  populate('dest',    AIRPORTS, 'BOS');

  // ── Star field ──
  const canvas = document.getElementById('sky-canvas');
  const ctx = canvas.getContext('2d');
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; drawStars(); }
  function drawStars() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0,'#06090f');
    grad.addColorStop(0.6,'#080d1a');
    grad.addColorStop(1,'#05080f');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // Stars
    for(let i=0;i<220;i++){
      const x=Math.random()*canvas.width;
      const y=Math.random()*canvas.height*0.75;
      const r=Math.random()*1.2+0.2;
      const a=Math.random()*0.7+0.2;
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,220,255,${a})`;
      ctx.fill();
    }
    // Moon
    const mx=canvas.width*0.82, my=canvas.height*0.1;
    const moonGrad=ctx.createRadialGradient(mx,my,2,mx,my,28);
    moonGrad.addColorStop(0,'rgba(240,248,255,0.9)');
    moonGrad.addColorStop(0.5,'rgba(200,220,255,0.4)');
    moonGrad.addColorStop(1,'rgba(100,140,200,0)');
    ctx.beginPath(); ctx.arc(mx,my,28,0,Math.PI*2);
    ctx.fillStyle=moonGrad; ctx.fill();
    ctx.beginPath(); ctx.arc(mx,my,18,0,Math.PI*2);
    ctx.fillStyle='rgba(235,245,255,0.85)'; ctx.fill();
    // Glow
    ctx.beginPath(); ctx.arc(mx,my,40,0,Math.PI*2);
    const glow=ctx.createRadialGradient(mx,my,18,mx,my,40);
    glow.addColorStop(0,'rgba(200,220,255,0.12)');
    glow.addColorStop(1,'rgba(200,220,255,0)');
    ctx.fillStyle=glow; ctx.fill();
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ── Predict ──
  async function predict() {
    const btn = document.getElementById('predict-btn');
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';
    btn.classList.add('loading'); btn.disabled = true;

    const hour    = parseInt(document.getElementById('deptime').value);
    const month   = parseInt(document.getElementById('month').value);
    const dist    = parseInt(document.getElementById('distance').value);

    const payload = {
      CRSDepTime      : hour * 100,
      DayOfWeek       : parseInt(document.getElementById('dow').value),
      Month           : month,
      Quarter         : Math.ceil(month/3),
      Distance        : dist,
      Airline         : document.getElementById('airline').value,
      Origin          : document.getElementById('origin').value,
      Dest            : document.getElementById('dest').value,
      TaxiOut         : parseInt(document.getElementById('taxiout').value),
      DistanceGroup   : Math.min(Math.floor(dist/500)+1,11),
      prior_leg_delay : parseInt(document.getElementById('prior').value),
    };

    try {
      const res = await fetch(`${API_URL}/predict`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      showResult(await res.json());
    } catch(e) {
      errEl.textContent = `⚠ ${e.message} — free tier may be sleeping, wait 30s and retry`;
      errEl.style.display = 'block';
    } finally {
      btn.classList.remove('loading'); btn.disabled = false;
    }
  }

  function showResult(data) {
    const isDelayed = data.prediction === 'DELAYED';
    const proba = data.delay_probability;
    document.getElementById('result-card').className = `result-card ${isDelayed?'delayed':'on-time'}`;
    document.getElementById('result-label').textContent = isDelayed ? '⚠  Likely Delayed' : '✓  Likely On Time';
    document.getElementById('result-route').textContent = `${data.airline}  ·  ${data.route}`;
    document.getElementById('prob-pct').textContent = `${(proba*100).toFixed(1)}%`;
    document.getElementById('stat-conf').textContent = data.confidence;
    document.getElementById('stat-prob').textContent = `${(proba*100).toFixed(1)}%`;
    document.getElementById('stat-verdict').textContent = data.prediction;
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';
    setTimeout(()=>{ document.getElementById('prob-bar').style.width=`${proba*100}%`; }, 60);
  }
</script>
</body>
</html>
